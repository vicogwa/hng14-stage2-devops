name: CI/CD Pipeline

on:
  push:
  pull_request:

env:
  REGISTRY: localhost:5000

jobs:

  # ── 1. Lint ─────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: flake8 — API
        run: flake8 api/ --max-line-length=120 --exclude=api/test

      - name: flake8 — Worker
        run: flake8 worker/ --max-line-length=120

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: npm ci — Frontend
        working-directory: frontend
        run: npm ci

      - name: ESLint — Frontend
        working-directory: frontend
        run: npx eslint . --ext .js

      - name: Hadolint — API
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Hadolint — Worker
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

      - name: Hadolint — Frontend
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

  # ── 2. Test ─────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r api/requirements.txt

      - name: Run pytest with coverage
        working-directory: api
        run: |
          pytest test/ \
            --cov=. \
            --cov-report=xml:../coverage.xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ── 3. Build ─────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Compute short SHA tag
        run: echo "SHA_TAG=${GITHUB_SHA::8}" >> "$GITHUB_ENV"

      - name: Build and push — API
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.REGISTRY }}/api:${{ env.SHA_TAG }}
            ${{ env.REGISTRY }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push — Worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/worker:${{ env.SHA_TAG }}
            ${{ env.REGISTRY }}/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push — Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/frontend:${{ env.SHA_TAG }}
            ${{ env.REGISTRY }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

 # ── 4. Security Scan ──────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4

      - name: Build images for scanning
        run: |
          docker build -t $REGISTRY/api:latest ./api
          docker build -t $REGISTRY/worker:latest ./worker
          docker build -t $REGISTRY/frontend:latest ./frontend

      - name: Trivy scan — API
        uses: aquasecurity/trivy-action@master
        env:
          TRIVY_SKIP_VERSION_CHECK: "true"
        with:
          image-ref: "${{ env.REGISTRY }}/api:latest"
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL
          exit-code: "1"
          vuln-type: "library"
          scanners: "vuln"

      - name: Trivy scan — Worker
        uses: aquasecurity/trivy-action@master
        env:
          TRIVY_SKIP_VERSION_CHECK: "true"
        with:
          image-ref: "${{ env.REGISTRY }}/worker:latest"
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL
          exit-code: "1"
          vuln-type: "library"
          scanners: "vuln"

      - name: Trivy scan — Frontend
        uses: aquasecurity/trivy-action@master
        env:
          TRIVY_SKIP_VERSION_CHECK: "true"
        with:
          image-ref: "${{ env.REGISTRY }}/frontend:latest"
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL
          exit-code: "1"
          vuln-type: "library"
          scanners: "vuln"
          
      - name: Upload SARIF artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif-results
          path: "*.sarif"

  # ── 5. Integration Test ──────────────────────────────────────
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for Compose
        run: |
          cat > .env << 'EOF'
          REDIS_HOST=redis
          REDIS_PORT=6379
          REDIS_PASSWORD=
          REDIS_QUEUE_KEY=job
          FRONTEND_PORT=3000
          ALLOWED_ORIGINS=*
          EOF

      - name: Start full stack
        run: docker compose up -d --build --wait --wait-timeout 120

      - name: Submit job and poll for completion
        run: |
          set -e

          RESPONSE=$(curl -sf -X POST http://localhost:3000/submit \
            -H "Content-Type: application/json")
          echo "Submit response: $RESPONSE"

          JOB_ID=$(echo "$RESPONSE" | python3 -c \
            "import sys, json; print(json.load(sys.stdin)['job_id'])")
          echo "Job ID: $JOB_ID"

          TIMEOUT=60
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(curl -sf "http://localhost:3000/status/$JOB_ID" \
              | python3 -c "import sys, json; print(json.load(sys.stdin)['status'])")
            echo "  [$ELAPSED s] status: $STATUS"

            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully"
              exit 0
            fi

            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done

          echo "FAIL: job did not complete within ${TIMEOUT}s"
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down -v --remove-orphans

  # ── 6. Deploy ────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Skip deploy if no server configured
        if: ${{ env.DEPLOY_HOST == '' }}
        run: |
          echo "No DEPLOY_HOST configured — skipping deploy"
          exit 0
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}

      - name: Rolling deploy via SSH
        if: ${{ env.DEPLOY_HOST != '' }}
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          echo "$DEPLOY_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          ssh -i /tmp/deploy_key \
              -o StrictHostKeyChecking=no \
              "$DEPLOY_USER@$DEPLOY_HOST" 'bash -s' << 'ENDSSH'
            set -e
            cd /opt/app
            git pull origin main

            rolling_update() {
              SERVICE=$1
              echo "Updating $SERVICE..."
              docker compose up -d --no-deps --build "$SERVICE"

              TIMEOUT=60
              ELAPSED=0
              while [ $ELAPSED -lt $TIMEOUT ]; do
                HEALTH=$(docker inspect \
                  --format='{{.State.Health.Status}}' \
                  "$(docker compose ps -q "$SERVICE")" 2>/dev/null || echo "unknown")
                echo "  $SERVICE health: $HEALTH"
                if [ "$HEALTH" = "healthy" ]; then
                  echo "$SERVICE is healthy"
                  return 0
                fi
                sleep 5
                ELAPSED=$((ELAPSED + 5))
              done

              echo "ERROR: $SERVICE failed health check — aborting deploy"
              return 1
            }

            rolling_update api
            rolling_update worker
            rolling_update frontend
          ENDSSH

          rm -f /tmp/deploy_key