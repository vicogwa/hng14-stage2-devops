name: CI/CD Pipeline

on:
  push:
  pull_request:

env:
  REGISTRY: localhost:5000

jobs:

  # ── 1. Lint ─────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: flake8 — API
        run: flake8 api/ --max-line-length=120 --exclude=api/tests

      - name: flake8 — Worker
        run: flake8 worker/ --max-line-length=120

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: npm ci — Frontend
        working-directory: frontend
        run: npm ci

      - name: ESLint — Frontend
        working-directory: frontend
        run: npx eslint . --ext .js

      - name: Hadolint — API
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Hadolint — Worker
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

      - name: Hadolint — Frontend
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

  # ── 2. Test ─────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r api/requirements.txt

      - name: Run pytest with coverage
        working-directory: api
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=xml:../coverage.xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ── 3. Build ─────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Compute short SHA tag
        run: echo "SHA_TAG=$(echo $GITHUB_SHA | cut -c1-8)" >> "$GITHUB_ENV"

      - name: Build and push — API
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.REGISTRY }}/api:${{ env.SHA_TAG }}
            ${{ env.REGISTRY }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push — Worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/worker:${{ env.SHA_TAG }}
            ${{ env.REGISTRY }}/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push — Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/frontend:${{ env.SHA_TAG }}
            ${{ env.REGISTRY }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. Security Scan ──────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build images for scanning
        run: |
          docker build -t $REGISTRY/api:latest ./api
          docker build -t $REGISTRY/worker:latest ./worker
          docker build -t $REGISTRY/frontend:latest ./frontend

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.69.3

      - name: Trivy scan — API
        run: |
          trivy image \
            --severity CRITICAL \
            --vuln-type library \
            --scanners vuln \
            --skip-version-check \
            --format sarif \
            --output trivy-api.sarif \
            --exit-code 1 \
            $REGISTRY/api:latest

      - name: Trivy scan — Worker
        run: |
          trivy image \
            --severity CRITICAL \
            --vuln-type library \
            --scanners vuln \
            --skip-version-check \
            --format sarif \
            --output trivy-worker.sarif \
            --exit-code 1 \
            $REGISTRY/worker:latest

      - name: Trivy scan — Frontend
        run: |
          trivy image \
            --severity CRITICAL \
            --vuln-type library \
            --scanners vuln \
            --skip-version-check \
            --format sarif \
            --output trivy-frontend.sarif \
            --exit-code 1 \
            $REGISTRY/frontend:latest

      - name: Upload SARIF artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif-results
          path: "*.sarif"

  # ── 5. Integration Test ──────────────────────────────────────
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env for Compose
        run: |
          cat > .env << 'EOF'
          REDIS_HOST=redis
          REDIS_PORT=6379
          REDIS_PASSWORD=integration-test-password
          REDIS_QUEUE_KEY=job
          FRONTEND_PORT=3000
          ALLOWED_ORIGINS=*
          EOF

      - name: Start full stack
        run: docker compose up -d --build --wait --wait-timeout 120

      - name: Run integration test script
        run: ./integration_test.sh

      - name: Tear down stack
        if: always()
        run: docker compose down -v --remove-orphans

  # ── 6. Deploy ────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check deploy secrets
        id: check-secrets
        run: |
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "No DEPLOY_HOST configured — skipping deploy"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Rolling deploy via SSH
        if: steps.check-secrets.outputs.skip == 'false'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          echo "$DEPLOY_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          ssh -i /tmp/deploy_key \
              -o StrictHostKeyChecking=no \
              "$DEPLOY_USER@$DEPLOY_HOST" 'bash -s' << 'ENDSSH'
            set -e
            cd /opt/app
            git pull origin main

            rolling_update() {
              SERVICE=$1
              echo "Updating $SERVICE..."
              docker compose up -d --no-deps --build "$SERVICE"

              TIMEOUT=60
              ELAPSED=0
              while [ $ELAPSED -lt $TIMEOUT ]; do
                HEALTH=$(docker inspect \
                  --format='{{.State.Health.Status}}' \
                  "$(docker compose ps -q "$SERVICE")" 2>/dev/null || echo "unknown")
                echo "  $SERVICE health: $HEALTH"
                if [ "$HEALTH" = "healthy" ]; then
                  echo "$SERVICE is healthy"
                  return 0
                fi
                sleep 5
                ELAPSED=$((ELAPSED + 5))
              done

              echo "ERROR: $SERVICE failed health check — aborting deploy"
              return 1
            }

            rolling_update api
            rolling_update worker
            rolling_update frontend
          ENDSSH

          rm -f /tmp/deploy_key